<h1>C++ Algorithms</h1>

<h2>Prime Number Program</h2>

<pre>
#include<iostream>
using namespace std;

int main(){

int n=7,count=0;

for(int i=1;i<=n;i++){
if(n%i==0)
count++;
}

if(count==2)
cout<<"Prime";
else
cout<<"Not Prime";

}
</pre>

<h2>Output</h2>

<pre>
Input: 7
Output: Prime
